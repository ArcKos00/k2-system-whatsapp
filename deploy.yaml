# =============================================================================
# WhatsApp API Gateway — Kubernetes deployment
# -----------------------------------------------------------------------------
# Apply with:   kubectl apply -f deploy.yaml -n k2-system
# (create the namespace once: kubectl create namespace k2-system)
#
# Notes:
#   * Single replica only — whatsapp-web.js keeps a LocalAuth session and a
#     headless-Chrome process that cannot be shared across pods.
#   * The session is persisted on a PVC; losing it forces a new QR login.
#   * /health is unauthenticated so probes work without a token.
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: whatsapp-api-config
  namespace: k2-system
  labels:
    app.kubernetes.io/name: whatsapp-api
    app.kubernetes.io/part-of: k2-system
data:
  PORT: "3000"
  NODE_ENV: "production"
  # Base URL of Keycloak WITHOUT trailing slash and WITHOUT /realms.
  KEYCLOAK_AUTH_SERVER_URL: "{{keycloak-base-url}}"
  KEYCLOAK_REALM: "{{keycloak-realm}}"
  # Expected token audience (client id). Empty -> audience check skipped.
  KEYCLOAK_AUDIENCE: "{{keycloak-audience}}"
  # Sub-path the service is exposed under by the Ingress below.
  PATH_BASE: "/whatsapp-api"
  WHATSAPP_CLIENT_ID: "default"
  WHATSAPP_SESSION_PATH: "/app/data/sessions"
  WHATSAPP_MESSAGE_DELAY_MS: "3000"
  PUPPETEER_EXECUTABLE_PATH: "/usr/bin/chromium"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whatsapp-data
  namespace: k2-system
  labels:
    app.kubernetes.io/name: whatsapp-api
    app.kubernetes.io/part-of: k2-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: "{{storage-class}}"   # uncomment / set if no default SC
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-api
  namespace: k2-system
  labels:
    app.kubernetes.io/name: whatsapp-api
    app.kubernetes.io/part-of: k2-system
spec:
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate): the PVC is RWO and the WhatsApp session is
    # single-owner, so the old pod must stop before the new one starts.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: whatsapp-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: whatsapp-api
        app.kubernetes.io/part-of: k2-system
    spec:
      securityContext:
        # node user (uid 1000) from the base image must own the mounted volume.
        fsGroup: 1000
      containers:
        - name: whatsapp-api
          # Built from this repo's Dockerfile and pushed to your registry.
          image: "{{registry}}/k2-system/whatsapp-api:{{tag}}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: whatsapp-api-config
          volumeMounts:
            - name: data
              mountPath: /app/data
          # Give the WhatsApp client time to connect / wait for QR login before
          # liveness starts killing the pod.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 30   # up to ~5 min for first-time login
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              # headless Chrome is memory-hungry.
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: whatsapp-data
---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-api
  namespace: k2-system
  labels:
    app.kubernetes.io/name: whatsapp-api
    app.kubernetes.io/part-of: k2-system
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: whatsapp-api
  ports:
    - name: http
      port: 3000
      targetPort: http
---
# Optional: external access for QR login (/whatsapp-api/qr) and Swagger
# (/whatsapp-api/docs). The web-server reaches the gateway in-cluster via the
# Service above (http://whatsapp-api:3000) and does NOT need this Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whatsapp-api
  namespace: k2-system
  labels:
    app.kubernetes.io/name: whatsapp-api
    app.kubernetes.io/part-of: k2-system
spec:
  rules:
    - host: "{{portal-host}}"
      http:
        paths:
          - path: /whatsapp-api
            pathType: Prefix
            backend:
              service:
                name: whatsapp-api
                port:
                  number: 3000
